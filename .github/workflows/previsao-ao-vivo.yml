name: Previsão ao vivo — Santa Tereza

on:
  schedule:
    - cron: '*/30 * * * *'   # a cada 30 minutos
  workflow_dispatch:           # permite rodar manualmente

jobs:
  prever:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install numpy scipy

      - name: Gerar previsão ao vivo
        working-directory: previne
        run: python robo/gerar_previsao_ao_vivo.py

      - name: Commitar previsao_ao_vivo.json
        run: |
          git config user.name  "previne-robo"
          git config user.email "previne-robo@users.noreply.github.com"
          git add previne/previsao_ao_vivo.json
          git diff --staged --quiet || git commit -m "bot: atualiza previsao_ao_vivo.json [skip ci]"
          git push
