name: Previsao ao vivo - Santa Tereza

on:
  schedule:
    # Plantao frequente de Santa Tereza: consulta curta a cada 5 min.
    - cron: '2-59/5 * * * *'
  workflow_dispatch:

jobs:
  prever:
    runs-on: ubuntu-latest
    concurrency:
      group: previsao-ao-vivo-previne-unificado
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install numpy scipy h5py

      - name: Gerar e publicar previsao ao vivo - Santa Tereza
        run: |
          git config user.name  "previne-robo"
          git config user.email "previne-robo@users.noreply.github.com"

          git pull --rebase --autostash origin main
          python previne/robo/gerar_previsao_ao_vivo.py

          git add previsao_ao_vivo.json historico_previsoes_ao_vivo.json
          if git diff --staged --quiet; then
            echo "sem mudanca neste ciclo"
          else
            git commit -m "bot: atualiza previsao_ao_vivo.json [skip ci]"
            publicado=0
            for tentativa in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push; then
                publicado=1
                break
              fi
              echo "push rejeitado (tentativa ${tentativa}), refazendo rebase..."
              sleep 3
            done
            if [ "$publicado" != "1" ]; then
              echo "falha ao publicar apos retries"
              exit 1
            fi
          fi
