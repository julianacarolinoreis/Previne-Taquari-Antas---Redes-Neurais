name: Previsao ao vivo - Santa Tereza e Mucum

on:
  schedule:
    # Plantao frequente: cada disparo faz 3 consultas, separadas por 5 min.
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  prever:
    runs-on: ubuntu-latest
    concurrency:
      group: previsao-ao-vivo-santa-tereza
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install numpy scipy h5py

      - name: Gerar e publicar previsoes ao vivo em janela de 15 min
        run: |
          git config user.name  "previne-robo"
          git config user.email "previne-robo@users.noreply.github.com"

          for ciclo in 1 2 3; do
            echo "===== ciclo ${ciclo}/3 ====="
            git pull --rebase --autostash origin main
            python previne/robo/gerar_previsao_ao_vivo.py
            python codigo_python/01_previsao_ao_vivo/gerar_previsao_ao_vivo_mucum.py

            git add previsao_ao_vivo.json historico_previsoes_ao_vivo.json previsao_ao_vivo_mucum.json
            if git diff --staged --quiet; then
              echo "sem mudanca neste ciclo"
            else
              git commit -m "bot: atualiza previsoes ao vivo [skip ci]"
              publicado=0
              for tentativa in 1 2 3 4 5; do
                if git pull --rebase --autostash origin main && git push; then
                  publicado=1
                  break
                fi
                echo "push rejeitado (tentativa ${tentativa}), refazendo rebase..."
                sleep 3
              done
              if [ "$publicado" != "1" ]; then
                echo "falha ao publicar apos retries"
                exit 1
              fi
            fi

            if [ "$ciclo" != "3" ]; then
              echo "aguardando 5 min para nova consulta..."
              sleep 300
            fi
          done
