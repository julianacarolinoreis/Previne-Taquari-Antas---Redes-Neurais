name: Previsao ao vivo - Santa Tereza

on:
  schedule:
    # Consulta frequente: se a ANA publicar leitura nova, a RNA recalcula na próxima janela.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  prever:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install numpy scipy h5py

      - name: Gerar previsao ao vivo
        run: python previne/robo/gerar_previsao_ao_vivo.py

      - name: Commitar previsao_ao_vivo.json
        run: |
          git config user.name  "previne-robo"
          git config user.email "previne-robo@users.noreply.github.com"
          git add previsao_ao_vivo.json historico_previsoes_ao_vivo.json
          git diff --staged --quiet && { echo "sem mudanca"; exit 0; }
          git commit -m "bot: atualiza previsao_ao_vivo.json [skip ci]"
          # Blindagem contra corrida: outros workflows commitam na main ao mesmo tempo.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push rejeitado (tentativa $i), refazendo rebase..."; sleep 3
          done
          echo "falha ao empurrar apos retries"; exit 1
