name: Install audit charts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip audit install]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Filter site to positive PERS models
        run: python3 .github/scripts/filter_positive_pers_site.py

      - name: Commit installed filtered site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.html assets/js/audit_charts.js assets/data/auditaveis_series.json
          if git diff --cached --quiet; then
            echo "Positive-PERS site already installed."
          else
            git commit -m "Filter site to positive PERS models [skip sync] [skip audit install]"
            git pull --rebase origin main
            git push
          fi
