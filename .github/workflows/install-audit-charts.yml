name: Install audit charts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip audit install]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download audit chart assets
        run: |
          set -euo pipefail
          curl -fL "https://tmpfiles.org/dl/wtwoaL7fSoBL/audit_core_package_v4.zip" -o audit_core_package.zip
          unzip -o audit_core_package.zip -d .
          rm -rf assets/audit_workbooks
          mkdir -p assets/audit_workbooks

          curl -fL "https://tmpfiles.org/dl/wTwbasd6z23g/audit_workbooks_12h_alt.zip" -o audit_workbooks_12H_ALT.zip
          unzip -o audit_workbooks_12H_ALT.zip -d assets/audit_workbooks
          curl -fL "https://tmpfiles.org/dl/wNwhaKdDz5uL/audit_workbooks_12h_conv.zip" -o audit_workbooks_12H_CONV.zip
          unzip -o audit_workbooks_12H_CONV.zip -d assets/audit_workbooks
          curl -fL "https://tmpfiles.org/dl/wTwkavdjzxIH/audit_workbooks_2h_alt.zip" -o audit_workbooks_2H_ALT.zip
          unzip -o audit_workbooks_2H_ALT.zip -d assets/audit_workbooks
          curl -fL "https://tmpfiles.org/dl/wAw0aCdAz4Bf/audit_workbooks_2h_conv.zip" -o audit_workbooks_2H_CONV.zip
          unzip -o audit_workbooks_2H_CONV.zip -d assets/audit_workbooks
          curl -fL "https://tmpfiles.org/dl/w5wpa3daz1sL/audit_workbooks_4h_alt.zip" -o audit_workbooks_4H_ALT.zip
          unzip -o audit_workbooks_4H_ALT.zip -d assets/audit_workbooks
          curl -fL "https://tmpfiles.org/dl/wPwPa9dXzUx6/audit_workbooks_8h_alt.zip" -o audit_workbooks_8H_ALT.zip
          unzip -o audit_workbooks_8H_ALT.zip -d assets/audit_workbooks
          curl -fL "https://tmpfiles.org/dl/wSwSaRdCiLla/audit_workbooks_8h_conv.zip" -o audit_workbooks_8H_CONV.zip
          unzip -o audit_workbooks_8H_CONV.zip -d assets/audit_workbooks

          rm -rf assets/mat
          mkdir -p assets/mat
          curl -fL "https://tmpfiles.org/dl/wfwQal7CSx8y/mat_assets_01.zip" -o mat_assets_01.zip
          unzip -o mat_assets_01.zip -d assets/mat
          curl -fL "https://tmpfiles.org/dl/wcwfan7JCOVQ/mat_assets_02.zip" -o mat_assets_02.zip
          unzip -o mat_assets_02.zip -d assets/mat
          curl -fL "https://tmpfiles.org/dl/w3wcaj7FC9tK/mat_assets_03.zip" -o mat_assets_03.zip
          unzip -o mat_assets_03.zip -d assets/mat
          curl -fL "https://tmpfiles.org/dl/wnwGar7aC9Y6/mat_assets_04.zip" -o mat_assets_04.zip
          unzip -o mat_assets_04.zip -d assets/mat
          curl -fL "https://tmpfiles.org/dl/wuwCaJ7wCYie/mat_assets_05.zip" -o mat_assets_05.zip
          unzip -o mat_assets_05.zip -d assets/mat
          curl -fL "https://tmpfiles.org/dl/wcwJax7YC34n/mat_assets_06.zip" -o mat_assets_06.zip
          unzip -o mat_assets_06.zip -d assets/mat
          curl -fL "https://tmpfiles.org/dl/wUw5aj7FCkEG/mat_assets_07.zip" -o mat_assets_07.zip
          unzip -o mat_assets_07.zip -d assets/mat
          curl -fL "https://tmpfiles.org/dl/wgwDae7BraVe/mat_assets_08.zip" -o mat_assets_08.zip
          unzip -o mat_assets_08.zip -d assets/mat
          curl -fL "https://tmpfiles.org/dl/wvwGaR7Nrg0E/mat_assets_09.zip" -o mat_assets_09.zip
          unzip -o mat_assets_09.zip -d assets/mat
          curl -fL "https://tmpfiles.org/dl/wzwvaq7vr93v/mat_assets_10.zip" -o mat_assets_10.zip
          unzip -o mat_assets_10.zip -d assets/mat
          curl -fL "https://tmpfiles.org/dl/w4w8ar7erdQN/mat_assets_11.zip" -o mat_assets_11.zip
          unzip -o mat_assets_11.zip -d assets/mat

          python3 - <<'PY'
          from pathlib import Path
          workbook_count = len(list(Path('assets/audit_workbooks').glob('*.xlsx')))
          mat_count = len(list(Path('assets/mat').glob('*.mat')))
          if workbook_count != 377:
              raise SystemExit(f'Expected 377 workbook files, found {workbook_count}')
          if mat_count != 329:
              raise SystemExit(f'Expected 329 MAT files, found {mat_count}')
          print(f'Installed {workbook_count} workbook files and {mat_count} MAT files')
          PY

      - name: Link audit charts in index
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path('index.html')
          html = p.read_text(encoding='utf-8')
          html = re.sub(r'\s*<link rel="stylesheet" href="assets/css/audit_charts\.css(?:\?v=[^"]*)?">\s*', '\n', html)
          html = re.sub(r'\s*<script src="assets/js/audit_charts\.js(?:\?v=[^"]*)?"></script>\s*', '\n', html)
          css = '  <link rel="stylesheet" href="assets/css/audit_charts.css?v=20260704-mat-v4">'
          js = '  <script src="assets/js/audit_charts.js?v=20260704-mat-v4"></script>'
          html = html.replace('</head>', css + '\n</head>')
          html = html.replace('</body>', js + '\n</body>')
          p.write_text(html, encoding='utf-8')
          PY

      - name: Commit installed charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.html assets
          if git diff --cached --quiet; then
            echo "Audit charts and MAT downloads already installed."
          else
            git commit -m "Install audit MAT downloads [skip sync] [skip audit install]"
            git pull --rebase origin main
            git push
          fi
