name: Install audit charts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip audit install]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download filtered audit/site package
        run: |
          set -euo pipefail
          curl --retry 5 --retry-delay 5 --retry-all-errors -A "Mozilla/5.0" -fL "https://tmpfiles.org/dl/wYwXawu87SJg/audit_core_package_pers_positive_v1.zip" -o audit_core_package.zip
          unzip -o audit_core_package.zip -d .
          test -f index.html
          test -f assets/data/auditaveis_series.json
          test -f assets/js/audit_charts.js
          test -f assets/css/audit_charts.css

      - name: Validate positive PERS filter
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          pers_keys = ['PERS_geral', 'PERS_treino', 'PERS_validacao', 'PERS_teste']
          html = Path('index.html').read_text(encoding='utf-8')
          match = re.search(r'<script id="data" type="application/json">(.*?)</script>', html, re.S)
          if not match:
              raise SystemExit('Main data JSON block not found in index.html')
          data = json.loads(match.group(1))
          models = data.get('models', [])
          if len(models) != 158:
              raise SystemExit(f'Expected 158 positive-PERS main models, found {len(models)}')
          bad = [m.get('modelo') for m in models if any(m.get(k) is None or m.get(k) <= 0 for k in pers_keys)]
          if bad:
              raise SystemExit('Found non-positive PERS models after filtering: ' + ', '.join(map(str, bad[:10])))

          audit = json.loads(Path('assets/data/auditaveis_series.json').read_text(encoding='utf-8'))
          audit_count = len(audit.get('models', []))
          if audit_count != 313:
              raise SystemExit(f'Expected 313 filtered audit series, found {audit_count}')

          workbook_count = len(list(Path('assets/audit_workbooks').glob('*.xlsx')))
          mat_count = len(list(Path('assets/mat').glob('*.mat')))
          print(f'Positive-PERS validation OK: {len(models)} main models, {audit_count} audit series')
          print(f'Published evidence files visible after checkout: {workbook_count} workbooks, {mat_count} MAT files')
          PY

      - name: Commit installed filtered site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.html assets
          if git diff --cached --quiet; then
            echo "Positive-PERS site already installed."
          else
            git commit -m "Filter site to positive PERS models [skip sync] [skip audit install]"
            git pull --rebase origin main
            git push
          fi
