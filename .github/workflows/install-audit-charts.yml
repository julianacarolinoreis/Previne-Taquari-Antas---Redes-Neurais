name: Install audit charts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip audit install]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download audit chart assets
        run: |
          set -euo pipefail
          curl -fL "https://tmpfiles.org/dl/wowca9tPk1wl/audit_core_package_v6.zip" -o audit_core_package.zip
          unzip -o audit_core_package.zip -d .
          test -d assets/audit_workbooks
          test -d assets/mat

          python3 - <<'PY'
          from pathlib import Path
          workbook_count = len(list(Path('assets/audit_workbooks').glob('*.xlsx')))
          mat_count = len(list(Path('assets/mat').glob('*.mat')))
          if workbook_count != 377:
              raise SystemExit(f'Expected 377 workbook files already in repo, found {workbook_count}')
          if mat_count != 329:
              raise SystemExit(f'Expected 329 MAT files already in repo, found {mat_count}')
          print(f'Installed audit panel v7; kept {workbook_count} workbook files and {mat_count} MAT files')
          PY

      - name: Link audit charts in index
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path('index.html')
          html = p.read_text(encoding='utf-8')
          html = re.sub(r'\s*<link rel="stylesheet" href="assets/css/audit_charts\.css(?:\?v=[^"]*)?">\s*', '\n', html)
          html = re.sub(r'\s*<script src="assets/js/audit_charts\.js(?:\?v=[^"]*)?"></script>\s*', '\n', html)
          css = '  <link rel="stylesheet" href="assets/css/audit_charts.css?v=20260704-mat-v7">'
          js = '  <script src="assets/js/audit_charts.js?v=20260704-mat-v7"></script>'
          html = html.replace('</head>', css + '\n</head>')
          html = html.replace('</body>', js + '\n</body>')
          p.write_text(html, encoding='utf-8')
          PY

      - name: Commit installed charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.html assets
          if git diff --cached --quiet; then
            echo "Audit charts already installed."
          else
            git commit -m "Clarify audit MAT evidence panel [skip sync] [skip audit install]"
            git pull --rebase origin main
            git push
          fi
