name: Sync PREVINE site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: ${{ !contains(github.event.head_commit.message, '[skip sync]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Copy PREVINE site from temporary PMRR location
        run: |
          curl -fsSL "https://raw.githubusercontent.com/julianacarolinoreis/PMRR-Porto-Alegre/main/previne/index.html" -o index.html
          touch .nojekyll

      - name: Commit synchronized site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .nojekyll
          if git diff --cached --quiet; then
            echo "PREVINE site already synchronized."
          else
            git commit -m "Sync PREVINE site from PMRR [skip sync]"
            git push
          fi
