name: Previsao ao vivo - Mucum (manual)

on:
  workflow_dispatch:

jobs:
  prever:
    runs-on: ubuntu-latest
    concurrency:
      group: previsao-ao-vivo-mucum
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install numpy scipy
      - name: Gerar e publicar previsao ao vivo (Mucum)
        run: |
          git config user.name  "previne-robo"
          git config user.email "previne-robo@users.noreply.github.com"
          for ciclo in 1 2 3; do
            echo "===== ciclo ${ciclo}/3 ====="
            git pull --rebase --autostash origin main
            python codigo_python/01_previsao_ao_vivo/gerar_previsao_ao_vivo_mucum.py
            git add previsao_ao_vivo_mucum.json
            if git diff --staged --quiet; then
              echo "sem mudanca neste ciclo"
            else
              git commit -m "bot: atualiza previsao_ao_vivo_mucum.json [skip ci]"
              publicado=0
              for tentativa in 1 2 3 4 5; do
                if git pull --rebase --autostash origin main && git push; then
                  publicado=1
                  break
                fi
                echo "push rejeitado (${tentativa}), rebase..."
                sleep 3
              done
              if [ "$publicado" != "1" ]; then
                echo "falha ao publicar previsao_ao_vivo_mucum.json"
                exit 1
              fi
            fi
            if [ "$ciclo" != "3" ]; then sleep 300; fi
          done
