# ROBÔ Vulnerabilidade — baixa IBGE (Censo 2022), recorta para a bacia
# Taquari-Antas e commita os dados prontos do mapa. Autossuficiente:
# roda no botão (Run workflow) e 1x/mês — sem depender de ninguém.

name: Vulnerabilidade — dados IBGE (bacia Taquari-Antas)

on:
  workflow_dispatch:
    inputs:
      bacia_url:
        description: "URL alternativa do limite da bacia (geojson ou zip de shapefile) — opcional"
        required: false
  schedule:
    - cron: "17 6 3 * *"   # dia 3 de cada mês, 06:17 UTC (recolhe correções do IBGE)

permissions:
  contents: write

concurrency:
  group: vulnerabilidade-dados
  cancel-in-progress: false

jobs:
  dados:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências geoespaciais
        run: pip install pandas geopandas pyogrio shapely

      - name: Baixar dados do IBGE e limite da bacia
        env:
          BACIA_URL: ${{ github.event.inputs.bacia_url }}
        run: python codigo_python/06_vulnerabilidade/baixar_ibge.py

      - name: Processar (recorte da bacia + indicadores + geojson)
        run: python codigo_python/06_vulnerabilidade/preparar_vulnerabilidade.py

      - name: Commitar assets/data/vulnerabilidade
        run: |
          git config user.name  "previne-robo"
          git config user.email "previne-robo@users.noreply.github.com"
          git add assets/data/vulnerabilidade
          git diff --staged --quiet && { echo "sem mudança"; exit 0; }
          git commit -m "bot: dados de vulnerabilidade (IBGE 2022) da bacia [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push rejeitado ($i), rebase..."; sleep 3
          done
          echo "falha ao empurrar"; exit 1
